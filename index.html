<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Tracker</title>
    <link rel="shortcut icon" href="jobs.png" type="image/x-icon">

    <!-- taiwind & daisy -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

<style>
    *{
        font-family: "Geist", sans-serif;
    }
</style>
</head>
<body class="max-w-max mx-auto">

    <!-- Header Section -->
    <section class="header mt-16">
        <h1 class="text-neutral font-bold text-4xl mb-4">Job Application Tracker</h1>

        <div class="card-container flex gap-6">
            <div class="card w-100 h-32 bg-base-200 card-xs shadow-sm">
            <div class="card-body">
                <p class="text-lg">Total</p>
                <h2 class="text-neutral font-bold text-2xl">8</h2>
            </div>
        </div>
        <div class="card w-84 bg-base-200 card-xs shadow-sm">
            <div class="card-body">
                <p class="text-lg">Total</p>
                <h2 class="text-green-400 font-bold text-2xl">0</h2>
            </div>
        </div>
        <div class="card w-84 bg-base-200 card-xs shadow-sm">
            <div class="card-body">
                <p class="text-lg">Total</p>
                <h2 class="text-red-400 font-bold text-2xl">0</h2>
            </div>
        </div>
        </div>

    </section>
    
</body>
</html>
